* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-mono, monospace); }

.root { padding: 1.5rem 0; display: flex; flex-direction: column; gap: 1.5rem; }

.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: #3266ad; }
h1.title { font-size: 20px; font-weight: 500; color: var(--color-text-primary); font-family: var(--font-sans); }

.input-row { display: flex; gap: 8px; align-items: stretch; }
.ipa-input { flex: 1; font-family: var(--font-mono); font-size: 22px; padding: 10px 14px; background: var(--color-background-primary); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); color: var(--color-text-primary); outline: none; }
.ipa-input:focus { border-color: #3266ad; box-shadow: 0 0 0 2px rgba(50,102,173,0.15); }
.phoneme-chips { display: flex; flex-wrap: wrap; gap: 6px; }
.chip { font-family: var(--font-mono); font-size: 14px; padding: 5px 12px; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-secondary); cursor: pointer; transition: border-color 0.12s, color 0.12s, background 0.12s; }
.chip:hover { border-color: var(--color-border-primary); color: var(--color-text-primary); background: var(--color-background-primary); }
.chip.active { border-color: #3266ad; color: #3266ad; background: #E6F1FB; }

.section { display: flex; flex-direction: column; gap: 10px; }
.section-header { display: flex; align-items: baseline; gap: 10px; padding-bottom: 6px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-text-secondary); font-family: var(--font-sans); }
.section-desc { font-size: 12px; color: var(--color-text-tertiary); font-family: var(--font-sans); }
.layer-tag { font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 4px; letter-spacing: 0.06em; }
.tag-s { background: #E6F1FB; color: #185FA5; }
.tag-p { background: #EAF3DE; color: #3B6D11; }
.tag-e { background: #FAEEDA; color: #854F0B; }
.tag-r { background: #EEEDFE; color: #3C3489; }

.channels { display: flex; flex-direction: column; gap: 5px; }
.channel-row { display: grid; grid-template-columns: 160px 1fr 52px; align-items: center; gap: 10px; }
.ch-name { font-family: var(--font-mono); font-size: 12px; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.ch-bar-track { height: 6px; background: var(--color-background-secondary); border-radius: 3px; position: relative; overflow: hidden; }
.ch-bar-fill { height: 100%; border-radius: 3px; transition: width 0.35s cubic-bezier(0.25,0.46,0.45,0.94); position: absolute; left: 0; top: 0; }
.ch-val { font-family: var(--font-mono); font-size: 12px; color: var(--color-text-primary); text-align: right; }
.ch-val.zero { color: var(--color-text-tertiary); }

.phoneme-info { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.info-card { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; }
.info-label { font-size: 11px; color: var(--color-text-tertiary); font-family: var(--font-sans); margin-bottom: 3px; }
.info-val { font-size: 14px; font-weight: 500; color: var(--color-text-primary); font-family: var(--font-sans); }

.empty-state { font-size: 14px; color: var(--color-text-tertiary); font-family: var(--font-sans); padding: 1rem 0; text-align: center; }

.articulator-groups { display: flex; flex-direction: column; gap: 12px; }

.group-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--font-sans); padding-left: 2px; }

const LAYER_COLORS = {
  S: { bar: "#3266ad", fill: "#c8ddf6" },
  P: { bar: "#3B6D11", fill: "#c0dd97" },
  E: { bar: "#854F0B", fill: "#fac775" },
  R: { bar: "#3C3489", fill: "#CECBF6" },
};

function pct(val) {
  if (val < 0) return Math.abs(val) * 50;
  return val * 100;
}

function leftOffset(val) {
  if (val < 0) return (1 + val) * 50;
  return 50;
}

function isBipolar(val) { return val < 0; }

function renderChannel(name, val, color) {
  const isZero = Math.abs(val) < 0.005;
  const displayVal = val.toFixed(2);
  const width = pct(val).toFixed(1) + "%";
  const left = isBipolar(val) ? leftOffset(val).toFixed(1) + "%" : "0%";
  return `
    <div class="channel-row">
      <span class="ch-name" title="${name}">${name}</span>
      <div class="ch-bar-track">
        <div class="ch-bar-fill" style="width:${width};left:${left};background:${color.bar};"></div>
      </div>
      <span class="ch-val${isZero ? " zero" : ""}">${displayVal}</span>
    </div>`;
}

function renderGroups(channels, color) {
  let html = "";
  for (const g of ARTICULATOR_GROUPS) {
    const relevant = g.channels.filter(ch => ch in channels);
    if (!relevant.length) continue;
    html += `<div class="artic-group"><span class="group-label">${g.label}</span>`;
    for (const ch of relevant) {
      html += renderChannel(ch, channels[ch] || 0, color);
    }
    html += `</div>`;
  }
  return html;
}

function renderPhoneme(sym) {
  const key = sym.replace(/\//g, "").trim();
  const data = PHONEME_DB[key];

  document.getElementById("emptyState").style.display = data ? "none" : "";
  document.getElementById("infoSection").style.display = data ? "" : "none";
  document.getElementById("channelsSection").style.display = data ? "" : "none";

  document.querySelectorAll(".chip").forEach(c => c.classList.toggle("active", c.dataset.sym === key));

  if (!data) {
    if (key.length > 0) {
      document.getElementById("emptyState").textContent = `/${key}/ not in database — try a common IPA symbol`;
      document.getElementById("emptyState").style.display = "";
    }
    return;
  }

  document.getElementById("phonemeInfo").innerHTML = `
    <div class="info-card">
      <div class="info-label">manner</div>
      <div class="info-val">${data.manner}</div>
    </div>
    <div class="info-card">
      <div class="info-label">place</div>
      <div class="info-val">${data.place}</div>
    </div>
    <div class="info-card">
      <div class="info-label">voicing</div>
      <div class="info-val">${data.voicing}</div>
    </div>`;

  const color = LAYER_COLORS.S;
  document.getElementById("articulatorGroups").innerHTML = `
    <div class="section-header">
      <span class="layer-tag tag-s">S layer</span>
      <span class="section-label">Speech articulation</span>
      <span class="section-desc">${data.name}</span>
    </div>
    <div class="channels">
      ${renderGroups(data.S, color)}
    </div>`;
}

const chipsEl = document.getElementById("chips");
CHIPS_LIST.forEach(sym => {
  const chip = document.createElement("button");
  chip.className = "chip";
  chip.dataset.sym = sym;
  chip.textContent = "/" + sym + "/";
  chip.onclick = () => {
    document.getElementById("ipaInput").value = sym;
    renderPhoneme(sym);
  };
  chipsEl.appendChild(chip);
});

const input = document.getElementById("ipaInput");
input.addEventListener("input", () => renderPhoneme(input.value));

renderPhoneme("i");
input.value = "i";
</script>
